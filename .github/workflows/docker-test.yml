name: Docker image build test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  push:
    branches:
      - 'renovate/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build ${{ matrix.image-tag-suffix }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - docker-file: "./Dockerfile.php.8.1"
            image-tag-suffix: "-php8.1"
          - docker-file: "./Dockerfile.php.8.2"
            image-tag-suffix: "-php8.2"
          - docker-file: "./Dockerfile.php.8.3"
            image-tag-suffix: "-php8.3"
          - docker-file: "./Dockerfile.php.8.4"
            image-tag-suffix: "-php8.4"
          - docker-file: "./Dockerfile.php.8.5"
            image-tag-suffix: "-php8.5"

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to ghcr
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ${{ matrix.docker-file }}
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/docker-php-fpm:latest${{ matrix.image-tag-suffix }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

  all-builds-succeeded:
    name: All builds succeeded
    runs-on: ubuntu-latest
    needs: [docker]
    if: always()
    steps:
      - name: Verify matrix results
        run: |
          results='${{ toJson(needs) }}'
          echo "Needs context: $results"
          # Fail if any dependency did not succeed
          for r in ${{ join(needs.*.result, ' ') }}; do
            if [ "$r" != "success" ]; then
              echo "At least one matrix job did not succeed."
              exit 1
            fi
          done
          echo "All matrix jobs succeeded."
